*{box-sizing:border-box}
html,body{height:100%;margin:0;font-family:'Cairo',system-ui,-apple-system,'Segoe UI',Tahoma,Arial,sans-serif;background:linear-gradient(180deg,#f8fbff,#eef6ff);color:#172235;overflow:hidden}
.sync-wrap{height:100vh;display:grid;place-items:center;padding:22px}
.sync-box{width:min(92vw,540px);text-align:center}
.sync-logo{
  width:150px;height:150px;margin:0 auto 30px;border-radius:42px;
  display:grid;place-items:center;color:#174ea6;background:rgba(255,255,255,.88);
  box-shadow:0 24px 55px rgba(23,78,166,.16),inset 0 0 28px rgba(23,78,166,.08)
}
.sync-logo img{width:95px;height:95px;object-fit:contain}
h1{font-size:34px;line-height:1.25;margin:0 0 12px;font-weight:950;color:#172235}
p{font-size:19px;color:#667085;font-weight:800;margin:0 0 34px}
.progress-card{border:1px solid #e3eaf5;border-radius:26px;background:#fff;padding:24px;text-align:right;box-shadow:0 18px 46px rgba(15,23,42,.07)}
.status-line{display:flex;align-items:center;gap:14px;font-size:18px;font-weight:900;color:#26344a;margin-bottom:20px}
.status-icon{width:54px;height:54px;min-width:54px;border-radius:17px;background:#edf4ff;color:#174ea6;display:grid;place-items:center}
.status-icon svg{width:27px;height:27px;fill:none;stroke:currentColor;stroke-width:2.4}
.track{height:18px;border-radius:999px;background:#e9eff7;overflow:hidden;margin:0 8px 20px}
.fill{height:100%;width:5%;border-radius:999px;background:linear-gradient(90deg,#174ea6,#2f7df6);box-shadow:0 5px 18px rgba(23,78,166,.28);transition:width .25s ease}
.row{display:flex;align-items:center;justify-content:space-between;color:#667085;font-weight:900}
.pct{background:#eef4ff;color:#174ea6;border-radius:18px;padding:9px 16px;font-size:18px;font-weight:950}
}
@media(max-width:520px){
  .sync-wrap{align-items:center;padding:18px}
  .sync-logo{width:138px;height:138px;margin-top:6px}
  h1{font-size:28px}
  p{font-size:17px}
  .progress-card{padding:20px}
}

    }catch(e){}

      const cache=await caches.open('cashtop-pages-v183-dashboard-chart-cache-first-fast');

        await cache.put('./'+pageName(),res.clone()).catch(()=>{});
      }
    }catch(e){}

    try{
      const reg=await navigator.serviceWorker.register('sw.js',{updateViaCache:'none'});

    save();
    await waitProgress(36,'تم تجهيز البيانات المحلية');
    await waitProgress(54,'جاري رفع العمليات غير المزامنة...');
    await syncQueue();
    await waitProgress(74,'جاري جلب البيانات غير الموجودة على هذا الجهاز...');
    await pullMissingOnly();
    await waitProgress(88,'جاري فحص بيانات النسخ السابقة...');
    await importLegacyIfNeeded();
    finishProgress('تم تجهيز البيانات');
  }catch(e){
    console.warn(e);
    finishProgress('تم فتح البيانات المحلية');
  }
  const doneTimer=setInterval(()=>{
    if(pct>=99.5){
      clearInterval(doneTimer);
      setTimeout(()=>location.replace('dashboard.html'),120);
    }
  },45);
})();
})();
</script>
