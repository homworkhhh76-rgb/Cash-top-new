<script>
const firebaseConfig = {
  apiKey: "AIzaSyBM-xAF2lf0cspTu1-7HAXxyoORGGZsxA8",
  authDomain: "toppo-14392.firebaseapp.com",
  databaseURL: (location.origin && location.origin !== "null" ? location.origin : "") + "/api/rtdb",
  projectId: "cashtop-mongodb",
  storageBucket: "toppo-14392.firebasestorage.app",
  messagingSenderId: "124300854330",
  appId: "1:124300854330:web:47e832cd565a0ef5c32103",
  measurementId: "G-Q8H7CZRMTC"
};
const qs=new URLSearchParams(location.search);
let company=qs.get('company')||'';let branch=qs.get('branch')||'main';
try{const s=JSON.parse(localStorage.getItem('oscarSession')||'null');company=company||s?.companyKey||'COMPANY001';branch=branch||s?.branchId||'main'}catch(e){company=company||'COMPANY001'}
const state={products:[],categories:[],invoices:[],settings:{},display:50,cat:'all',q:'',cart:[]};
const $=s=>document.querySelector(s), money=v=>(state.settings.currency||'₪')+' '+(Number(v||0).toFixed(2));
function safe(v){return String(v||'').replace(/[.#$[\]/]/g,'_')}
function rows(v){if(!v)return[];if(Array.isArray(v))return v.filter(Boolean);return Object.entries(v).filter(([id])=>!String(id).startsWith('__')).map(([id,o])=>({id,...(o||{})}))}
function localKeys(){const c=encodeURIComponent(company),b=encodeURIComponent(branch);return [`oscarStoreV2__company__${c}__branch__${b}`,`oscarStoreV2__company__${c}`,`oscarStoreV2_${company}`]}
function showLoader(msg){$('#loaderText').textContent=msg||'جاري التحميل...';$('#loader').classList.add('show')}
function hideLoader(){$('#loader').classList.remove('show')}
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1300)}
function cacheRemoteMenuData(){try{const c=encodeURIComponent(company),b=encodeURIComponent(branch);localStorage.setItem(`oscarStoreV2__company__${c}__branch__${b}`,JSON.stringify({products:state.products,categories:state.categories,invoices:state.invoices,settings:[state.settings]}));}catch(e){}}
function loadLocal(){for(const k of localKeys()){try{const st=JSON.parse(localStorage.getItem(k)||'{}');if((st.products||[]).length){state.products=st.products||[];state.categories=st.categories||[];state.invoices=st.invoices||[];state.settings=(st.settings||[])[0]||{};normalizeCategories();return true}}catch(e){}}return false}
async function getRemote(path){const clean=String(path||'').split('/').map(x=>safe(x)).join('/');const u=firebaseConfig.databaseURL+'?path='+encodeURIComponent(clean);const r=await fetch(u,{cache:'no-store'});if(!r.ok)throw new Error(r.status);return await r.json()}
async function loadRemote(){
  const paths=[
    `companies/${safe(company)}/branchesData/${safe(branch)}/data`,
    `companies/${safe(company)}/branchesData/main/data`,
    `companies/COMPANY001/branchesData/${safe(branch)}/data`,
    `companies/COMPANY001/branchesData/main/data`,
    'data',
    ''
  ];
  let data=null;
  for(const path of paths){
    try{
      const v=await getRemote(path);
      if(v && (v.products || v.settings || v.categories || v.invoices)){data=v;break}
    }catch(e){}
  }
  data=data||{};
  state.products=rows(data.products);
  state.categories=rows(data.categories);
  state.invoices=rows(data.invoices);
  state.settings=rows(data.settings)[0]||{};
  normalizeCategories();
  cacheRemoteMenuData();
}
function norm(v){return String(v??'').trim().toLowerCase()}
function productCategoryValue(p){return p.categoryId||p.category_id||p.catId||p.category||p.categoryName||p.sectionId||''}
function categoryName(c){return c.name||c.title||c.label||c.categoryName||'قسم'}
function categoryMatches(p,c){const pv=norm(productCategoryValue(p));return pv && (pv===norm(c.id)||pv===norm(categoryName(c))||pv===norm(c.slug)||pv===norm(c.code))}
function normalizeCategories(){
  const seen=new Set(); const cats=[];
  state.categories.forEach(c=>{const id=String(c.id||categoryName(c)); if(!seen.has(id)){seen.add(id); cats.push({...c,id})}});
  state.products.forEach(p=>{const v=productCategoryValue(p); if(v && !cats.some(c=>categoryMatches(p,c))){const id=String(v); cats.push({id,name:String(p.categoryName||p.category||v)});}});
  state.categories=cats;
}
function categoryLabelForProduct(p){const c=state.categories.find(c=>categoryMatches(p,c));return c?categoryName(c):(productCategoryValue(p)||'منتج')}
function soldMap(){const m={};state.invoices.forEach(inv=>(inv.items||[]).forEach(l=>{const id=String(l.productId||l.id||'');if(id)m[id]=(m[id]||0)+Number(l.stockQty||l.qty||1)}));return m}
function productIcon(){return `<span class="product-svg"><svg viewBox="0 0 64 64"><path d="M12 24h40l-4 29H16l-4-29Z"/><path d="M22 24a10 10 0 0 1 20 0"/><path d="M22 36h20M24 45h16"/></svg></span>`}
function productImg(p){
  const src=p.image||p.imageUrl||p.photo||'';
  const icon=productIcon();
  return src ? `${icon}<img src="${src}" loading="lazy" onload="this.classList.add('loaded')" onerror="this.remove()">` : icon;
}
function allowNegative(){return state.settings.allowNegative===true || String(state.settings.allowNegative)==='true'} 
function clothesModeEnabled(){return state.settings.clothesStoreEnabled===true || String(state.settings.clothesStoreEnabled)==='true'}
function productClothingRows(p){return Array.isArray(p?.clothingVariants)?p.clothingVariants.filter(r=>r&&(r.color||r.size)):[]}
function clothingColors(p){return [...new Set(productClothingRows(p).map(r=>String(r.color||'').trim()).filter(Boolean))]}
function clothingRowsForColor(p,color){return productClothingRows(p).filter(r=>String(r.color||'')===String(color))}
function clothingSizesForColor(p,color){return clothingRowsForColor(p,color).map(r=>String(r.size||'').trim()).filter(Boolean)}
function firstClothingRow(p){return productClothingRows(p).find(r=>Number(r.stock||0)>0)||productClothingRows(p)[0]||null}
function clothingRow(p,color,size){return productClothingRows(p).find(r=>String(r.color||'')===String(color||'')&&String(r.size||'')===String(size||''))}
function clothingStock(p,color,size){return Number(clothingRow(p,color,size)?.stock||0)}
function menuLineProduct(l){return state.products.find(p=>String(p.id)===String(l.id))}
function lineAvailable(l){const p=menuLineProduct(l); if(!p)return true; if(clothesModeEnabled()&&productClothingRows(p).length)return allowNegative()||clothingStock(p,l.color,l.size)>0; return isAvailable(p)}
function clothingLabel(l){return (l.color||l.size)?`<small>${l.color||'لون'} / ${l.size||'مقاس'}</small>`:''}
function colorOptions(p,selected){return clothingColors(p).map(c=>`<option value="${c}" ${String(c)===String(selected)?'selected':''}>${c}</option>`).join('')}
function sizeOptions(p,color,selected){return clothingSizesForColor(p,color).map(s=>`<option value="${s}" ${String(s)===String(selected)?'selected':''}>${s}</option>`).join('')}


function isAvailable(p){if(clothesModeEnabled()&&productClothingRows(p).length){const r=firstClothingRow(p);return allowNegative()||Number(r?.stock||0)>0}return allowNegative() || Number(p.stock||0)>0}
function filteredProducts(){const sold=soldMap();let arr=[...state.products].filter(p=>p&&p.name);if(state.cat!=='all')arr=arr.filter(p=>{const c=state.categories.find(c=>String(c.id)===String(state.cat));return c?categoryMatches(p,c):String(productCategoryValue(p))===String(state.cat)});if(state.q){const q=state.q.toLowerCase();arr=arr.filter(p=>String(p.name||'').toLowerCase().includes(q)||String(p.barcode||'').includes(q))}arr.sort((a,b)=>(sold[String(b.id)]||0)-(sold[String(a.id)]||0));return arr}
function paymentMethods(){const m=state.settings.menuPaymentMethods;return Array.isArray(m)?m.filter(x=>x.name||x.info||x.icon):[]}
function payIcon(m){return m.icon?`<img src="${m.icon}" onerror="this.outerHTML='<span class=&quot;pay-icon&quot;><svg viewBox=&quot;0 0 24 24&quot;><path d=&quot;M3 7h18v10H3zM3 10h18M7 15h4&quot;/></svg></span>'">`:`<span class="pay-icon"><svg viewBox="0 0 24 24"><path d="M3 7h18v10H3zM3 10h18M7 15h4"/></svg></span>`}
function renderShell(){
  const s=state.settings||{};
  $('#storeName').textContent=s.storeName||s.companyName||'';
  const logo=s.menuLogoUrl||s.logoUrl||'';
  if(logo){$('#brandLogo').src=logo;$('#brandLogo').style.display='block'}else{$('#brandLogo').removeAttribute('src');$('#brandLogo').style.display='none'}
  if(s.menuBannerUrl){$('#heroImg').src=s.menuBannerUrl;$('#heroImg').style.display='block'}else{$('#heroImg').style.display='none'}
  $('#paymentMethods').innerHTML=paymentMethods().length?paymentMethods().map(m=>`<div class="pay-method">${payIcon(m)}<div><b>${m.name||'طريقة دفع'}</b><small>${m.info||''}</small></div></div>`).join(''):'<div class="empty">لا توجد طرق دفع حالياً</div>';
  const wa=String(s.menuWhatsapp||'').replace(/[^\d]/g,'');
  const floatingEnabled=s.menuWhatsappFloating!==false && String(s.menuWhatsappFloating)!=='false';
  const cartEnabled=s.menuWhatsappCart!==false && String(s.menuWhatsappCart)!=='false';
  if(wa && floatingEnabled){$('#whatsappBtn').href='https://wa.me/'+wa;$('#whatsappBtn').style.display='grid'}else{$('#whatsappBtn').style.display='none'}
  const wb=$('#sendWhatsappOrder'); if(wb) wb.style.display=(wa && cartEnabled)?'flex':'none';
}
function catSvg(){return `<svg viewBox="0 0 24 24"><path d="M4 7h16M7 7v10a3 3 0 0 0 3 3h4a3 3 0 0 0 3-3V7"/><path d="M9 11h6M9 15h4"/></svg>`}
function renderCategories(){normalizeCategories();const strip=$('#categoryStrip');strip.innerHTML=`<button class="cat-chip ${state.cat==='all'?'active':''}" data-cat="all">${catSvg()} الأكثر طلبًا</button>`+state.categories.map(c=>`<button class="cat-chip ${String(state.cat)===String(c.id)?'active':''}" data-cat="${c.id}">${catSvg()} ${categoryName(c)}</button>`).join('');strip.querySelectorAll('[data-cat]').forEach(b=>b.onclick=()=>{showLoader('جاري تحميل القسم...');state.cat=b.dataset.cat;state.display=50;setTimeout(()=>{render();hideLoader()},220)})}
function renderProducts(){const all=filteredProducts(), shown=all.slice(0,state.display);$('#sectionTitle').textContent=state.cat==='all'?'الأكثر طلبًا':(state.categories.find(c=>String(c.id)===String(state.cat))?.name||'المنتجات');$('#itemsCount').textContent=all.length+' منتج';$('#productsGrid').innerHTML=shown.length?shown.map(p=>{const ok=isAvailable(p);return `<article class="product-card">${!ok?'<span class="out-badge">غير متوفر</span>':''}<div class="product-img">${productImg(p)}</div><div class="product-body"><div class="product-name">${p.name}</div><div class="product-meta">${categoryLabelForProduct(p)}</div><div class="product-price">${money(p.salePrice||p.price||p.unitSale||0)}</div><button class="add-btn ${ok?'':'disabled'}" ${ok?`data-add="${p.id}"`:''}>${ok?'إضافة للسلة':'غير متوفر'}</button></div></article>`}).join(''):'<div class="empty" style="grid-column:1/-1">لا توجد منتجات</div>';$('#moreBtn').style.display=state.display<all.length?'flex':'none';document.querySelectorAll('[data-add]').forEach(b=>b.onclick=()=>addToCart(b.dataset.add))}
function render(){renderShell();renderCategories();renderProducts();renderCart()}
function addToCart(id){const p=state.products.find(x=>String(x.id)===String(id));if(!p)return;if(!isAvailable(p)){toast('المنتج غير متوفر');return}const first=firstClothingRow(p);const isClothes=clothesModeEnabled()&&productClothingRows(p).length;const color=isClothes?(first?.color||''):'';const size=isClothes?(first?.size||''):'';const line=isClothes?null:state.cart.find(x=>String(x.id)===String(id));if(line)line.qty++;else state.cart.push({id:p.id,name:p.name,price:Number(p.salePrice||p.price||p.unitSale||0),qty:1,color,size,isClothes});toast('تمت الإضافة للسلة');renderCart()}
function renderCart(){const total=state.cart.reduce((a,l)=>a+l.price*l.qty,0);$('#cartCount').textContent=state.cart.reduce((a,l)=>a+l.qty,0);$('#cartTotal').textContent=money(total);$('#cartLines').innerHTML=state.cart.length?state.cart.map((l,i)=>{const p=menuLineProduct(l),cl=clothesModeEnabled()&&p&&productClothingRows(p).length;return `<div class="cart-line ${cl?'clothes-line':''}"><b>${l.name}<br><small>${money(l.price)}</small>${clothingLabel(l)}</b><span><button class="qty-btn" data-minus="${i}">-</button> ${l.qty} <button class="qty-btn" data-plus="${i}">+</button></span><b>${money(l.price*l.qty)}</b>${cl?`<div class="menu-cart-options"><select data-color="${i}">${colorOptions(p,l.color)}</select><select data-size="${i}">${sizeOptions(p,l.color,l.size)}</select></div>`:''}</div>`}).join(''):'<div class="empty">السلة فارغة</div>';document.querySelectorAll('[data-plus]').forEach(b=>b.onclick=()=>{const i=Number(b.dataset.plus),l=state.cart[i];if(!allowNegative()&&l&&l.isClothes&&clothingStock(menuLineProduct(l),l.color,l.size)<=l.qty){toast('المقاس غير متوفر');return;}state.cart[i].qty++;renderCart()});document.querySelectorAll('[data-minus]').forEach(b=>b.onclick=()=>{const l=state.cart[b.dataset.minus];l.qty--;if(l.qty<=0)state.cart.splice(b.dataset.minus,1);renderCart()});document.querySelectorAll('[data-color]').forEach(s=>s.onchange=()=>{const i=Number(s.dataset.color),p=menuLineProduct(state.cart[i]);state.cart[i].color=s.value;state.cart[i].size=clothingSizesForColor(p,s.value)[0]||'';renderCart()});document.querySelectorAll('[data-size]').forEach(s=>s.onchange=()=>{const i=Number(s.dataset.size);state.cart[i].size=s.value;renderCart()})}
function openCart(){$('#overlay').classList.add('show');$('#cartSheet').classList.add('show')}function closeAll(){$('#overlay').classList.remove('show');$('#cartSheet').classList.remove('show');$('#drawer').classList.remove('show')}
function loadCanvasImage(src){return new Promise((resolve,reject)=>{const img=new Image();img.crossOrigin='anonymous';img.onload=()=>resolve(img);img.onerror=reject;img.src=src})}
function orderText(){const notes=$('#orderNotes').value.trim();let txt=`طلب جديد من منيو ${(state.settings.storeName||state.settings.companyName||'المتجر')}\n\n`;state.cart.forEach((l,i)=>{txt+=`${i+1}. ${l.name}${l.color||l.size?' - '+(l.color||'')+' / '+(l.size||''):''} × ${l.qty} = ${money(l.price*l.qty)}\n`});txt+=`\nالإجمالي: ${money(state.cart.reduce((a,l)=>a+l.price*l.qty,0))}`;if(notes)txt+=`\n\nملاحظات: ${notes}`;return txt}
function sendWhatsappOrder(){if(!state.cart.length){toast('السلة فارغة');return}const wa=String(state.settings.menuWhatsapp||'').replace(/[^\d]/g,'');if(!wa){toast('رقم واتساب غير مضاف');return}window.open('https://wa.me/'+wa+'?text='+encodeURIComponent(orderText()),'_blank')}
async function downloadInvoice(){if(!state.cart.length){toast('السلة فارغة');return}const c=document.createElement('canvas');c.width=1000;c.height=1400;const x=c.getContext('2d');const grad=x.createLinearGradient(0,0,1000,260);grad.addColorStop(0,'#172235');grad.addColorStop(1,'#2563eb');x.fillStyle='#fff';x.fillRect(0,0,c.width,c.height);x.fillStyle=grad;x.fillRect(0,0,1000,250);const invoiceStoreName=(state.settings.storeName||state.settings.companyName||'').trim();const logo=(state.settings.menuLogoUrl||state.settings.logoUrl||state.settings.storeLogo||state.settings.logo||'').trim();x.fillStyle='#fff';x.font='bold 56px Cairo,Arial';x.textAlign='right';if(invoiceStoreName)x.fillText(invoiceStoreName,930,86);x.font='28px Cairo,Arial';x.fillText('فاتورة طلب من المنيو الرقمي',930,132);x.font='22px Cairo,Arial';x.fillText(new Date().toLocaleString('ar'),930,174);x.fillStyle='rgba(255,255,255,.18)';if(x.roundRect){x.beginPath();x.roundRect(55,45,145,145,34);x.fill()}else{x.fillRect(55,45,145,145)}if(logo){try{const img=await loadCanvasImage(logo);x.drawImage(img,70,60,115,115)}catch(e){}}x.textAlign='right';let y=315; x.fillStyle='#172235';x.font='bold 30px Cairo,Arial';x.fillText('تفاصيل الطلب',930,y);y+=38;let total=0;x.font='24px Cairo,Arial';state.cart.forEach((l,i)=>{x.fillStyle=i%2?'#f8fafc':'#fff';x.fillRect(70,y-28,860,52);x.fillStyle='#172235';x.fillText(l.name+(l.color||l.size?' - '+(l.color||'')+' / '+(l.size||''):''),910,y);x.fillText('× '+l.qty,520,y);x.fillText(money(l.price*l.qty),270,y);total+=l.price*l.qty;y+=58});x.strokeStyle='#e5e7eb';x.lineWidth=3;x.beginPath();x.moveTo(70,y+8);x.lineTo(930,y+8);x.stroke();x.fillStyle='#0f766e';x.font='bold 38px Cairo,Arial';x.fillText('الإجمالي: '+money(total),930,y+70);const notes=$('#orderNotes').value.trim();if(notes){x.fillStyle='#334155';x.font='24px Cairo,Arial';x.fillText('ملاحظات الطلب:',930,y+130);x.font='22px Cairo,Arial';wrapCanvasText(x,notes,930,y+170,760,34)}x.fillStyle='#64748b';x.font='22px Cairo,Arial';x.fillText('يرجى إرسال الصورة للمتجر لتأكيد الطلب',930,1335);const a=document.createElement('a');a.download='فاتورة-منيو-كاش-توب.png';a.href=c.toDataURL('image/png');a.click()}
function wrapCanvasText(ctx,text,x,y,maxWidth,lineHeight){String(text).split('\n').forEach(part=>{let words=part.split(' '),line='';for(const w of words){const test=line+w+' ';if(ctx.measureText(test).width>maxWidth&&line){ctx.fillText(line,x,y);line=w+' ';y+=lineHeight}else line=test}ctx.fillText(line,x,y);y+=lineHeight})}
$('#searchInput').oninput=e=>{state.q=e.target.value;state.display=50;renderProducts()}
$('#moreBtn').onclick=()=>{showLoader('جاري تحميل المزيد...');setTimeout(()=>{state.display+=50;renderProducts();hideLoader()},220)}
$('#cartBtn').onclick=openCart;$('#closeCart').onclick=closeAll;$('#overlay').onclick=closeAll;$('#drawerBtn').onclick=()=>{$('#overlay').classList.add('show');$('#drawer').classList.add('show')};$('#closeDrawer').onclick=closeAll;$('#downloadInvoice').onclick=downloadInvoice;$('#sendWhatsappOrder').onclick=sendWhatsappOrder;
(async()=>{try{showLoader('جاري قراءة البيانات المحلية...');const local=loadLocal();if(!local&&navigator.onLine){showLoader('جاري تحميل منتجات المنيو...');await loadRemote()}else if(local&&navigator.onLine){setTimeout(()=>loadRemote().then(render).catch(()=>{}),500)}render()}catch(e){console.warn(e);$('#productsGrid').innerHTML='<div class="empty" style="grid-column:1/-1">تعذر تحميل المنيو</div>'}finally{hideLoader()}})();
</script>
