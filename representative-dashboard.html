<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>لوحة المندوب</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet"><style>
*{box-sizing:border-box}body{margin:0;background:#f4f7fb;color:#0f172a;font-family:Cairo,Tahoma,Arial,sans-serif}.wrap{max-width:1180px;margin:0 auto;padding:16px 14px 82px}.top{background:linear-gradient(135deg,#0f766e,#2563eb);color:#fff;border-radius:24px;padding:18px;display:flex;justify-content:space-between;gap:12px;align-items:center;box-shadow:0 16px 36px rgba(37,99,235,.18)}.top h1{margin:0;font-size:24px}.top p{margin:4px 0 0;opacity:.9}.btn{border:0;border-radius:14px;padding:10px 14px;font-weight:900;cursor:pointer;background:#fff;color:#0f172a}.btn.primary{background:#2563eb;color:#fff}.btn.red{background:#ef4444;color:#fff}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin:14px 0}.card{background:#fff;border:1px solid #e5e7eb;border-radius:22px;padding:14px;box-shadow:0 8px 26px rgba(15,23,42,.06)}.stat small{color:#64748b;font-weight:800}.stat b{display:block;font-size:22px;margin-top:6px;color:#1d4ed8}.section-title{display:flex;justify-content:space-between;align-items:center;gap:10px;margin:18px 0 10px}h2{margin:0;font-size:18px}table{width:100%;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid #eef2f7;text-align:right;font-size:13px}th{background:#eff6ff;color:#1d3972}.table-wrap{overflow:auto}.badge{display:inline-block;padding:5px 10px;border-radius:999px;font-weight:900;font-size:12px}.green{background:#dcfce7;color:#166534}.redb{background:#fee2e2;color:#991b1b}.warn{background:#fef3c7;color:#92400e}.modal{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;padding:14px;z-index:100}.modal.show{display:flex}.box{width:min(520px,100%);background:#fff;border-radius:22px;padding:16px}.field{margin-bottom:10px}.field label{display:block;font-weight:900;margin-bottom:5px}.input,select,textarea{width:100%;border:1px solid #dbe4f0;border-radius:14px;padding:11px;font-family:inherit}.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 16px;border-radius:14px;opacity:0;pointer-events:none;transition:.2s;z-index:200}.toast.show{opacity:1}@media(max-width:800px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.top{align-items:flex-start;flex-direction:column}.wrap{padding:10px 8px 80px}.card{border-radius:18px}th,td{font-size:12px;padding:8px}.stat b{font-size:18px}}@media(max-width:480px){.grid{grid-template-columns:1fr}}</style></head><body><div id="toast" class="toast"></div><div class="wrap"><header class="top"><div><h1>لوحة المندوب</h1><p id="repInfo">تحميل...</p></div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn primary" onclick="openCashier()">بيع على الكاشير</button><button class="btn" onclick="openDeliverPayment()">تسليم مبلغ</button><button class="btn red" onclick="logout()">خروج</button></div></header><section class="grid" id="stats"></section><div class="section-title"><h2>مخزوني الحالي</h2></div><div class="card table-wrap"><table><thead><tr><th>المنتج</th><th>الكمية</th><th>سعر البيع</th><th>القيمة</th></tr></thead><tbody id="inventoryRows"></tbody></table></div><div class="section-title"><h2>طلباتي وفواتيري</h2></div><div class="card table-wrap"><table><thead><tr><th>الرقم</th><th>التاريخ</th><th>الإجمالي</th><th>المدفوع</th><th>المتبقي</th><th>الحالة</th></tr></thead><tbody id="orderRows"></tbody></table></div><div class="section-title"><h2>حركاتي المالية</h2><button class="btn primary" onclick="openCollection()">تسجيل تحصيل</button></div><div class="card table-wrap"><table><thead><tr><th>التاريخ</th><th>النوع</th><th>المبلغ</th><th>ملاحظات</th></tr></thead><tbody id="txRows"></tbody></table></div><div class="section-title"><h2>حركات المخزون والإرجاع</h2><button class="btn" onclick="openReturnRequest()">طلب إرجاع</button></div><div class="card table-wrap"><table><thead><tr><th>التاريخ</th><th>المنتج</th><th>الكمية</th><th>النوع</th><th>ملاحظات</th></tr></thead><tbody id="moveRows"></tbody></table></div><div class="section-title"><h2>إشعارات الإدارة</h2></div><div class="card table-wrap"><table><thead><tr><th>التاريخ</th><th>الإشعار</th></tr></thead><tbody id="notificationRows"></tbody></table></div></div><div class="modal" id="modal"><div class="box"><h2 id="modalTitle"></h2><div id="modalBody"></div><div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px"><button class="btn" onclick="closeModal()">إلغاء</button><button class="btn primary" id="modalSave">حفظ</button></div></div></div><script>
const API='https://cash-top-api-2026.vercel.app/api/rtdb'; const session=JSON.parse(localStorage.getItem('oscarSession')||'null'); if(!session||session.role!=='representative'){location.replace('login.html')} const companyKey=session.companyKey, repId=session.representativeId||session.userId, branchId=session.branchId||'main'; const safe=v=>String(v||'').trim().replace(/[.#$\[\]/]/g,'_'); const p=path=>API+'?path='+encodeURIComponent(String(path||'').split('/').map(safe).join('/')); const n=v=>Number(String(v??0).replace(/[^\d.\-]/g,'')||0); const money=v=>'₪ '+Number(v||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); const esc=v=>String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); const uid=x=>x+'_'+Date.now()+'_'+Math.random().toString(16).slice(2); let data={products:[],representativeInventory:[],representativeMovements:[],representativeTransactions:[],representativeOrders:[],representativeNotifications:[],representatives:[],accounts:[]}; function toast(m,t='ok'){const el=document.getElementById('toast');el.textContent=m;el.style.background=t==='bad'?'#b91c1c':'#111827';el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200)} function key(){return `repDash_${companyKey}_${branchId}_${repId}`} function saveLocal(){localStorage.setItem(key(),JSON.stringify(data))} function loadLocal(){try{const v=JSON.parse(localStorage.getItem(key())||'null'); if(v)data={...data,...v}}catch(e){}} async function get(path){const r=await fetch(p(path),{cache:'no-store'}); if(!r.ok)throw new Error('GET'); return await r.json()} async function set(path,val){const r=await fetch(p(path),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(val)}); if(!r.ok)throw new Error('PUT'); return await r.json()} function qkey(){return `repDashQueue_${companyKey}_${branchId}_${repId}`} function queueSet(path,val){try{const q=JSON.parse(localStorage.getItem(qkey())||'[]');q.push({path,val,ts:Date.now()});localStorage.setItem(qkey(),JSON.stringify(q.slice(-300)))}catch(e){}} async function setQueued(path,val){try{if(!navigator.onLine) throw new Error('offline'); await set(path,val); return true;}catch(e){queueSet(path,val); return false;}} async function flushQueue(){let q=[];try{q=JSON.parse(localStorage.getItem(qkey())||'[]')}catch(e){} if(!q.length||!navigator.onLine)return; const keep=[]; for(const job of q){try{await set(job.path,job.val)}catch(e){keep.push(job)}} try{localStorage.setItem(qkey(),JSON.stringify(keep.slice(-300)))}catch(e){}} function rows(v){if(!v)return[]; if(Array.isArray(v))return v.filter(Boolean); return Object.entries(v).filter(([id])=>!String(id).startsWith('__')).map(([id,x])=>({id,...(x||{})}))} async function loadRemote(){try{const base=`companies/${companyKey}/branchesData/${branchId}/data`; const [prod,ri,mv,tx,ord,nt,rep,acc]=await Promise.all([get(base+'/products').catch(()=>null),get(base+'/representativeInventory').catch(()=>null),get(base+'/representativeMovements').catch(()=>null),get(base+'/representativeTransactions').catch(()=>null),get(base+'/representativeOrders').catch(()=>null),get(base+'/representativeNotifications').catch(()=>null),get(`companies/${companyKey}/representatives`).catch(()=>null),get(base+'/accounts').catch(()=>null)]); data.products=rows(prod); data.representativeInventory=rows(ri).filter(x=>String(x.representativeId)===String(repId)); data.representativeMovements=rows(mv).filter(x=>String(x.representativeId)===String(repId)); data.representativeTransactions=rows(tx).filter(x=>String(x.representativeId)===String(repId)); data.representativeOrders=rows(ord).filter(x=>String(x.representativeId)===String(repId)); data.representativeNotifications=rows(nt).filter(x=>String(x.representativeId)===String(repId)); data.representatives=rows(rep); data.accounts=rows(acc); saveLocal(); await flushQueue(); render();}catch(e){console.warn(e);toast('تعذر المزامنة، تم عرض البيانات المحلية','bad')}} function balance(){const tx=data.representativeTransactions, ord=data.representativeOrders; const collected=tx.filter(t=>t.type==='collection').reduce((a,t)=>a+n(t.amount),0)+ord.reduce((a,o)=>a+n(o.paidAmount||o.paid),0); const delivered=tx.filter(t=>t.type==='payment_to_admin').reduce((a,t)=>a+n(t.amount),0); const returns=tx.filter(t=>t.type==='return_adjustment').reduce((a,t)=>a+n(t.amount),0)+ord.filter(o=>o.status==='returned').reduce((a,o)=>a+n(o.total),0); return{collected,delivered,returns,commission:ord.reduce((a,o)=>a+n(o.commissionAmount),0),balance:collected-delivered-returns,sales:ord.reduce((a,o)=>a+n(o.total),0)}} function typeLabel(t){return t==='collection'?'تحصيل':t==='payment_to_admin'?'تسليم للإدارة':t==='return_adjustment'?'تعديل مرتجع':t} function moveLabel(t){return t==='give_to_representative'?'استلام من الإدارة':t==='return_from_representative'?'إرجاع للإدارة':t==='representative_sale'?'بيع':t==='customer_return'?'مرتجع عميل':t} function render(){const rep=data.representatives.find(r=>String(r.id||r.representativeId)===String(repId))||session; document.getElementById('repInfo').textContent=`${rep.name||session.name||'مندوب'} — ${rep.area||session.area||''}`; const b=balance(); document.getElementById('stats').innerHTML=`<div class="card stat"><small>إجمالي المبيعات</small><b>${money(b.sales)}</b></div><div class="card stat"><small>المبالغ المحصلة</small><b>${money(b.collected)}</b></div><div class="card stat"><small>المسلم للإدارة</small><b>${money(b.delivered)}</b></div><div class="card stat"><small>الرصيد المتبقي عليّ</small><b>${money(b.balance)}</b></div><div class="card stat"><small>عمولتي</small><b>${money(b.commission||0)}</b></div>`; document.getElementById('inventoryRows').innerHTML=data.representativeInventory.map(x=>`<tr><td>${esc(x.productName)}</td><td>${n(x.quantity)}</td><td>${money(x.salePrice)}</td><td>${money(n(x.quantity)*n(x.salePrice))}</td></tr>`).join('')||'<tr><td colspan="4">لا يوجد مخزون</td></tr>'; document.getElementById('orderRows').innerHTML=data.representativeOrders.map(o=>`<tr><td>${esc(o.number||o.orderId||o.id)}</td><td>${new Date(o.createdAt||o.date||Date.now()).toLocaleString('ar')}</td><td>${money(o.total)}</td><td>${money(o.paidAmount||o.paid)}</td><td>${money(o.remainingAmount||o.remaining)}</td><td><span class="badge ${o.status==='done'?'green':'warn'}">${esc(o.status||'جديد')}</span></td></tr>`).join('')||'<tr><td colspan="6">لا توجد طلبات</td></tr>'; document.getElementById('txRows').innerHTML=data.representativeTransactions.sort((a,b)=>n(b.createdAt)-n(a.createdAt)).map(t=>`<tr><td>${new Date(t.createdAt||Date.now()).toLocaleString('ar')}</td><td>${typeLabel(t.type)}</td><td>${money(t.amount)}</td><td>${esc(t.notes||'')}</td></tr>`).join('')||'<tr><td colspan="4">لا توجد حركات</td></tr>'; document.getElementById('moveRows').innerHTML=data.representativeMovements.sort((a,b)=>n(b.createdAt)-n(a.createdAt)).map(m=>`<tr><td>${new Date(m.createdAt||Date.now()).toLocaleString('ar')}</td><td>${esc(m.productName)}</td><td>${n(m.quantity)}</td><td>${moveLabel(m.type)}</td><td>${esc(m.notes||'')}</td></tr>`).join('')||'<tr><td colspan="5">لا توجد حركات</td></tr>'; document.getElementById('notificationRows').innerHTML=data.representativeNotifications.sort((a,b)=>n(b.createdAt)-n(a.createdAt)).map(x=>`<tr><td>${new Date(x.createdAt||Date.now()).toLocaleString('ar')}</td><td>${esc(x.text||x.message||'')}</td></tr>`).join('')||'<tr><td colspan="2">لا توجد إشعارات</td></tr>'} function openModal(title,body,onSave){document.getElementById('modalTitle').textContent=title;document.getElementById('modalBody').innerHTML=body;document.getElementById('modalSave').onclick=onSave;document.getElementById('modal').classList.add('show')} function closeModal(){document.getElementById('modal').classList.remove('show')} function openCollection(){openModal('تسجيل تحصيل من عميل',`<div class="field"><label>المبلغ</label><input class="input" id="amount" inputmode="decimal"></div><div class="field"><label>ملاحظات</label><input class="input" id="notes"></div>`,async()=>{const amount=n(document.getElementById('amount').value); if(amount<=0)return toast('أدخل مبلغ صحيح','bad'); const item={id:uid('rtx'),transactionId:uid('rtx'),companyKey,representativeId:repId,type:'collection',amount,notes:document.getElementById('notes').value,createdAt:Date.now()}; data.representativeTransactions.unshift(item); saveLocal(); render(); closeModal(); (await setQueued(`companies/${companyKey}/branchesData/${branchId}/data/representativeTransactions/${item.id}`,item))?toast('تم حفظ التحصيل'):toast('حفظ محلياً وسيتم مزامنته لاحقاً','bad');})} function openReturnRequest(){const opts=data.representativeInventory.map(x=>`<option value="${x.productId}">${esc(x.productName)} — ${n(x.quantity)}</option>`).join(''); openModal('طلب إرجاع',`<div class="field"><label>المنتج</label><select id="product">${opts}</select></div><div class="field"><label>الكمية</label><input class="input" id="qty" inputmode="decimal"></div><div class="field"><label>ملاحظات</label><input class="input" id="notes"></div>`,async()=>{const productId=document.getElementById('product').value, qty=n(document.getElementById('qty').value); const inv=data.representativeInventory.find(x=>String(x.productId)===String(productId)); if(!inv||qty<=0||qty>n(inv.quantity))return toast('كمية غير صحيحة','bad'); const item={id:uid('rrn'),companyKey,representativeId:repId,productId,productName:inv.productName,quantity:qty,status:'pending',notes:document.getElementById('notes').value,createdAt:Date.now()}; const mov={id:uid('rim'),companyKey,representativeId:repId,productId,productName:inv.productName,quantity:qty,type:'customer_return',notes:'طلب إرجاع: '+item.notes,createdAt:Date.now()}; data.representativeMovements.unshift(mov); saveLocal(); render(); closeModal(); const ok1=await setQueued(`companies/${companyKey}/branchesData/${branchId}/data/representativeReturns/${item.id}`,item); const ok2=await setQueued(`companies/${companyKey}/branchesData/${branchId}/data/representativeMovements/${mov.id}`,mov); (ok1&&ok2)?toast('تم إرسال طلب الإرجاع'):toast('حفظ محلياً وسيتم مزامنته لاحقاً','bad');})} function openDeliverPayment(){ const opts=(data.accounts||[]).map(a=>`<option value="${esc(a.id)}">${esc(a.name)} - ${money(a.balance)}</option>`).join(''); openModal('تسليم مبلغ للإدارة',`<div class="field"><label>المبلغ</label><input class="input" id="amount" inputmode="decimal"></div><div class="field"><label>الحساب المستلم</label><select id="account">${opts||'<option value="cash">صندوق الكاش</option>'}</select></div><div class="field"><label>ملاحظات</label><input class="input" id="notes"></div>`,async()=>{const amount=n(document.getElementById('amount').value); if(amount<=0)return toast('أدخل مبلغ صحيح','bad'); const accountId=document.getElementById('account').value||'cash'; const item={id:uid('rtx'),transactionId:uid('rtx'),companyKey,representativeId:repId,type:'payment_to_admin',amount,accountId,notes:document.getElementById('notes').value,createdAt:Date.now()}; data.representativeTransactions.unshift(item); let acc=data.accounts.find(a=>String(a.id)===String(accountId)); if(acc){acc.balance=n(acc.balance)+amount; acc.movements=acc.movements||[]; acc.movements.unshift({id:uid('mov'),kind:'representative_payment',amount,note:`تسليم من المندوب ${session.name||repId}`,date:new Date().toISOString(),refType:'representativeTransaction',refId:item.id});} saveLocal(); render(); closeModal(); const ok1=await setQueued(`companies/${companyKey}/branchesData/${branchId}/data/representativeTransactions/${item.id}`,item); const ok2=acc?await setQueued(`companies/${companyKey}/branchesData/${branchId}/data/accounts/${acc.id}`,acc):true; (ok1&&ok2)?toast('تم تسليم المبلغ وإضافته للحساب'):toast('حفظ محلياً وسيتم مزامنته لاحقاً','bad');}); } function openCashier(){location.href='cashier.html'} function logout(){localStorage.removeItem('oscarSession'); location.href='login.html'} loadLocal(); render(); flushQueue(); if(navigator.onLine)loadRemote(); window.addEventListener('online',()=>{flushQueue();loadRemote()}); if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script></body></html>
